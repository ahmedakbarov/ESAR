image:
  registry: ghcr.io/your-org
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 2
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

workers:
  replicas: 2
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "2", memory: 2Gi }

web:
  replicas: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }

ingress:
  enabled: true
  className: nginx
  host: esar.example.com
  tlsSecret: esar-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

config:
  environment: Production
  corsOrigin: https://esar.example.com
  redisConnection: redis.esar.svc.cluster.local:6379
  rabbitmqHost: rabbitmq.esar.svc.cluster.local
  rabbitmqUser: esar
  autoMigrate: "false"

# Provide via --set-file / external secret operator in real deployments.
secrets:
  postgresConnection: ""
  rabbitmqPassword: ""
  jwtSigningKey: ""
  encryptionKey: ""

persistence:
  reports:
    size: 10Gi
    accessMode: ReadWriteMany

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCpu: 70
