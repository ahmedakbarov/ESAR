# ============================================================================
# ESAR Kubernetes manifests (raw). For templated deployments use deploy/helm.
# Prerequisites: PostgreSQL, Redis and RabbitMQ (in-cluster or managed services);
# update the esar-config/esar-secrets values accordingly.
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: esar
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: esar-config
  namespace: esar
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  RabbitMq__Host: "rabbitmq.esar.svc.cluster.local"
  RabbitMq__Username: "esar"
  ConnectionStrings__Redis: "redis.esar.svc.cluster.local:6379"
  Database__AutoMigrate: "false"
  Cors__AllowedOrigins__0: "https://esar.example.com"
---
# Populate from your secret manager (e.g. external-secrets, sealed-secrets).
apiVersion: v1
kind: Secret
metadata:
  name: esar-secrets
  namespace: esar
type: Opaque
stringData:
  ConnectionStrings__Postgres: "Host=postgres.esar.svc.cluster.local;Port=5432;Database=esar;Username=esar;Password=REPLACE_ME"
  RabbitMq__Password: "REPLACE_ME"
  Jwt__SigningKey: "REPLACE_ME_MIN_32_CHARACTERS________"
  Security__EncryptionKey: "REPLACE_ME_BASE64_32_BYTES"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esar-api
  namespace: esar
  labels: { app: esar-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: esar-api }
  template:
    metadata:
      labels: { app: esar-api }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: ghcr.io/your-org/esar-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: esar-config }
            - secretRef: { name: esar-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: reports
              mountPath: /data/reports
      volumes:
        - name: reports
          persistentVolumeClaim: { claimName: esar-reports }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esar-workers
  namespace: esar
  labels: { app: esar-workers }
spec:
  replicas: 2
  selector:
    matchLabels: { app: esar-workers }
  template:
    metadata:
      labels: { app: esar-workers }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: workers
          image: ghcr.io/your-org/esar-workers:latest
          envFrom:
            - configMapRef: { name: esar-config }
            - secretRef: { name: esar-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
          volumeMounts:
            - name: reports
              mountPath: /data/reports
      volumes:
        - name: reports
          persistentVolumeClaim: { claimName: esar-reports }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esar-web
  namespace: esar
  labels: { app: esar-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: esar-web }
  template:
    metadata:
      labels: { app: esar-web }
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/esar-web:latest
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: esar-api
  namespace: esar
spec:
  selector: { app: esar-api }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: esar-web
  namespace: esar
spec:
  selector: { app: esar-web }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esar-reports
  namespace: esar
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esar
  namespace: esar
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [esar.example.com]
      secretName: esar-tls
  rules:
    - host: esar.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: esar-api, port: { number: 8080 } }
          - path: /swagger
            pathType: Prefix
            backend:
              service: { name: esar-api, port: { number: 8080 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: esar-web, port: { number: 80 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: esar-api
  namespace: esar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: esar-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
