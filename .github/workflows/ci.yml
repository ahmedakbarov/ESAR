name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ESAR.sln

      - name: Build
        run: dotnet build ESAR.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test tests/ESAR.UnitTests/ESAR.UnitTests.csproj -c Release --no-build --logger trx

      - name: Integration tests (Testcontainers/PostgreSQL)
        run: dotnet test tests/ESAR.IntegrationTests/ESAR.IntegrationTests.csproj -c Release --no-build --logger trx

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & type-check & build
        working-directory: src/frontend
        run: |
          npm install
          npm run build

  docker:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/esar-api:latest
            ${{ env.IMAGE_PREFIX }}/esar-api:${{ github.sha }}

      - name: Build & push Workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.workers
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/esar-workers:latest
            ${{ env.IMAGE_PREFIX }}/esar-workers:${{ github.sha }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/esar-web:latest
            ${{ env.IMAGE_PREFIX }}/esar-web:${{ github.sha }}
