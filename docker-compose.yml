name: esar

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: esar
      POSTGRES_USER: esar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esar_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esar -d esar"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: esar
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-esar_dev_password}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  esar-api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=esar;Username=esar;Password=${POSTGRES_PASSWORD:-esar_dev_password}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: esar
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-esar_dev_password}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-signing-key-change-me-32chars!}
      Security__EncryptionKey: ${ENCRYPTION_KEY:-3q2+7wCLpZFYuJfW9kQxOEnRVhTGdMbA1sYeUiPcK5o=}
      ESAR_ADMIN_INITIAL_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe-Admin-2024!}
      Database__AutoMigrate: "true"
    volumes:
      - reports-data:/data/reports
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  esar-workers:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.workers
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=esar;Username=esar;Password=${POSTGRES_PASSWORD:-esar_dev_password}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: esar
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-esar_dev_password}
      Security__EncryptionKey: ${ENCRYPTION_KEY:-3q2+7wCLpZFYuJfW9kQxOEnRVhTGdMbA1sYeUiPcK5o=}
      Database__AutoMigrate: "false"
    volumes:
      - reports-data:/data/reports
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      esar-api:
        condition: service_started

  esar-web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "8090:80"
    depends_on:
      - esar-api

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  reports-data:
